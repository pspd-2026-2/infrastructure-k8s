apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization-service
  namespace: pspd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: authorization-service
  template:
    metadata:
      labels:
        app: authorization-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: authorization-service
          image: ghcr.io/pspd-2026-2/service-a-authorizer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
            - containerPort: 50052
              name: grpc
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: authorization-service
  namespace: pspd
spec:
  type: ClusterIP
  selector:
    app: authorization-service
  ports:
    - name: http
      port: 8001
      targetPort: 8081
    - name: grpc
      port: 50052
      targetPort: 50052
