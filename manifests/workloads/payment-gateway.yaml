apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: pspd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: payment-gateway
          image: ghcr.io/pspd-2026-2/gateway:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: payment-gateway
  namespace: pspd
spec:
  type: ClusterIP
  selector:
    app: payment-gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: pspd
spec:
  type: ClusterIP
  selector:
    app: payment-gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
