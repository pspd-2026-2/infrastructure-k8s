apiVersion: apps/v1
kind: Deployment
metadata:
  name: antifraud-service
  namespace: pspd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: antifraud-service
  template:
    metadata:
      labels:
        app: antifraud-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: antifraud-service
          image: ghcr.io/pspd-2026-2/service-b-antifraud:latest
          imagePullPolicy: Always
          env:
            - name: REST_PORT
              value: "8001"
            - name: GRPC_PORT
              value: "50051"
          ports:
            - containerPort: 8001
              name: http
            - containerPort: 50051
              name: grpc
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: antifraud-service
  namespace: pspd
spec:
  type: ClusterIP
  selector:
    app: antifraud-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
    - name: grpc
      port: 50051
      targetPort: 50051
---
# Headless service para balanceamento gRPC client-side (round-robin).
# ClusterIP: None faz o DNS retornar os IPs de todos os pods individualmente,
# permitindo que o canal grpc.aio crie um subcanal por pod ao invés de fixar
# em um único endpoint de IP virtual.
apiVersion: v1
kind: Service
metadata:
  name: antifraud-grpc-headless
  namespace: pspd
spec:
  clusterIP: None
  selector:
    app: antifraud-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
