apiVersion: v1
kind: Pod
metadata:
  name: config-test
  namespace: pspd
spec:
  restartPolicy: Never
  containers:
    - name: config-test
      image: busybox
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "AUTHORIZATION_SERVICE_URL=$AUTHORIZATION_SERVICE_URL"
          echo "ANTIFRAUD_SERVICE_URL=$ANTIFRAUD_SERVICE_URL"
          echo "PAYMENT_GATEWAY_PORT=$PAYMENT_GATEWAY_PORT"
          echo "LOG_LEVEL=$LOG_LEVEL"
          echo "API_TOKEN=$API_TOKEN"
          echo "MOCK_CARD_KEY=$MOCK_CARD_KEY"
          sleep 300
      envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
